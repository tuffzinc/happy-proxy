<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Proxy 🎈</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .nav-bar {
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        h2 { margin: 0; color: #2c3e50; font-size: 1.15rem; white-space: nowrap; cursor: pointer; }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        button {
            padding: 10px 24px;
            border: none;
            background: #2ecc71;
            color: white;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #27ae60; }
        .btn-secondary {
            background: #3498db;
        }
        .btn-secondary:hover { background: #2980b9; }
        .btn-neutral {
            background: #95a5a6;
        }
        .btn-neutral:hover { background: #7f8c8d; }
        
        #layoutContainer {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        #viewPortContainer {
            flex-grow: 1;
            overflow: auto;
            position: relative;
        }
        #devToolsPanel {
            height: 250px;
            border-top: 2px solid #bdc3c7;
            background: #1c1c1c;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: none;
            flex-direction: column;
        }
        .dt-header {
            background: #2d2d2d;
            padding: 6px 12px;
            color: #dcdcdc;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .dt-close {
            cursor: pointer;
            color: #e74c3c;
            font-weight: bold;
        }
        .dt-logs {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .dt-input-line {
            display: flex;
            border-top: 1px solid #333;
            background: #111;
        }
        .dt-prompt {
            padding: 8px;
            color: #00ff00;
        }
        #dtConsoleInput {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <h2 onclick="goHome()">Happy Proxy 🎈</h2>
        <input type="text" id="urlInput" placeholder="Enter website URL (e.g., https://example.com)" value="https://example.com">
        <button onclick="loadWebsite()">Go</button>
        <button class="btn-neutral" onclick="reloadWebsite()">Reload</button>
        <button class="btn-secondary" onclick="toggleDevTools()">DevTools</button>
    </div>

    <div id="layoutContainer">
        <div id="viewPortContainer"></div>
        <div id="devToolsPanel">
            <div class="dt-header">
                <span>Console</span>
                <span class="dt-close" onclick="toggleDevTools()">✕</span>
            </div>
            <div class="dt-logs" id="dtLogs"></div>
            <div class="dt-input-line">
                <span class="dt-prompt">&gt;</span>
                <input type="text" id="dtConsoleInput" placeholder="Execute JS">
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('viewPortContainer');
        const shadowRoot = container.attachShadow({ mode: 'open' });
        const dtLogs = document.getElementById('dtLogs');
        const devToolsPanel = document.getElementById('devToolsPanel');

        function goHome() {
            window.location.href = 'index.html';
        }

        function logToConsole(msg, type = 'info') {
            const logRow = document.createElement('div');
            logRow.style.padding = '2px 0';
            if (type === 'error') logRow.style.color = '#ff6b6b';
            if (type === 'warn') logRow.style.color = '#f1c40f';
            if (type === 'success') logRow.style.color = '#2ecc71';
            logRow.textContent = `[${type.toUpperCase()}] ${msg}`;
            dtLogs.appendChild(logRow);
            dtLogs.scrollTop = dtLogs.scrollHeight;
        }

        function hookShadowConsole() {
            window.addEventListener('error', (e) => {
                logToConsole(e.message, 'error');
            });
        }
        hookShadowConsole();

        async function loadWebsite() {
            const input = document.getElementById('urlInput').value.trim();
            if (!input) return;

            let targetUrl = input;
            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'https://' + targetUrl;
            }

            const proxyEndpoint = window.location.origin + '/?url=' + encodeURIComponent(targetUrl);
            
            try {
                shadowRoot.innerHTML = '<div style="padding: 20px; font-family: sans-serif; color: #666;">Loading site into shadow pipeline...</div>';
                logToConsole(`Fetching connection stream: ${targetUrl}`);
                
                const response = await fetch(proxyEndpoint);
                if (!response.ok) throw new Error(`Network response failure (Status ${response.status})`);
                
                const htmlContent = await response.text();
                shadowRoot.innerHTML = htmlContent;
                logToConsole(`Successfully rendered source assets inside isolation matrix.`, 'success');

                shadowRoot.querySelectorAll('script').forEach(oldScript => {
                    try {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                        shadowRoot.appendChild(newScript);
                    } catch (err) {
                        logToConsole(`Script initialization block structural crash: ${err.message}`, 'error');
                    }
                });

            } catch (error) {
                shadowRoot.innerHTML = `<div style="padding: 20px; color: #e74c3c; font-family: sans-serif;">Proxy Viewport Render Error: ${error.message}</div>`;
                logToConsole(`Render Matrix Halt Exception: ${error.message}`, 'error');
            }
        }

        function reloadWebsite() {
            logToConsole('Reloading...');
            loadWebsite();
        }

        function toggleDevTools() {
            if (devToolsPanel.style.display === 'flex') {
                devToolsPanel.style.display = 'none';
            } else {
                devToolsPanel.style.display = 'flex';
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loadWebsite();
        });

        document.getElementById('dtConsoleInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                if (!cmd) return;
                
                logToConsole(`> ${cmd}`);
                this.value = '';
                
                try {
                    const result = new Function('shadowRoot', `with(shadowRoot) { return eval(${JSON.stringify(cmd)}); }`)(shadowRoot);
                    logToConsole(result !== undefined ? String(result) : 'undefined', 'success');
                } catch (err) {
                    logToConsole(err.message, 'error');
                }
            }
        });
    </script>
</body>
</html>
