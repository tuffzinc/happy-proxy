<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Proxy 🎈</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .nav-bar {
            background: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        h2 { margin: 0; color: #2c3e50; font-size: 1.15rem; white-space: nowrap; }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        button {
            padding: 10px 24px;
            border: none;
            background: #2ecc71;
            color: white;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #27ae60; }
        
        #viewPortContainer {
            flex-grow: 1;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            overflow: auto;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <h2>Happy Proxy 🎈</h2>
        <input type="text" id="urlInput" placeholder="Enter website URL (e.g., https://example.com)" value="https://example.com">
        <button onclick="loadWebsite()">Go</button>
    </div>

    <div id="viewPortContainer"></div>

    <script>
        const container = document.getElementById('viewPortContainer');
        const shadowRoot = container.attachShadow({ mode: 'open' });

        async function loadWebsite() {
            const input = document.getElementById('urlInput').value.trim();
            if (!input) return;

            let targetUrl = input;
            if (!/^https?:\/\//i.test(targetUrl)) {
                targetUrl = 'https://' + targetUrl;
            }

            const proxyEndpoint = window.location.origin + '/?url=' + encodeURIComponent(targetUrl);
            
            try {
                shadowRoot.innerHTML = '<div style="padding: 20px; font-family: sans-serif; color: #666;">Loading site into shadow pipeline...</div>';
                
                const response = await fetch(proxyEndpoint);
                if (!response.ok) throw new Error('Network response failure');
                
                const htmlContent = await response.text();
                
                shadowRoot.innerHTML = htmlContent;


            } catch (error) {
                shadowRoot.innerHTML = `<div style="padding: 20px; color: #e74c3c; font-family: sans-serif;">Proxy Viewport Render Error: ${error.message}</div>`;
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loadWebsite();
        });
    </script>
</body>
</html>
